<script>
// ═══════════════════════════════════════════════════════
// ESTADO GLOBAL
// ═══════════════════════════════════════════════════════
const CATEGORIAS_TAREA=["Marketing","Ventas","Logística","Inventario","Atención al cliente","Finanzas","General"];
const PLATAFORMAS=["Facebook Marketplace","Instagram","TikTok","WhatsApp","Presencial"];

const SINPE_NUMERO="8888-8888"; // ← cambiá este número al tuyo

let supa=null;
let socios=[],tareas=[],posts=[],engagement=[],productos=[],ventas=[],clientes=[];

// ═══════════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════════
function hoyISO(){const d=new Date();return d.toISOString().slice(0,10);}
function fechaBonita(f){if(!f)return"—";return new Date(f+"T00:00:00").toLocaleDateString("es-CR",{day:"numeric",month:"short"});}
function nombreDia(f){const d=new Date(f+"T00:00:00");return["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"][d.getDay()];}
function esc(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function rolesArr(s){return s.roles?String(s.roles).split(",").map(x=>x.trim()).filter(Boolean):[]}
function fmtCRC(n){return n?("₡"+Number(n).toLocaleString("es-CR")):"₡0";}
function diasRestantes(f){if(!f)return null;const h=new Date(hoyISO());const x=new Date(f+"T00:00:00");return Math.round((x-h)/86400000);}
function estadoFecha(f,estado){
  if(estado==="logrado")return{texto:"Logrado",color:"#059669",bg:"#D1FAE5"};
  const d=diasRestantes(f);
  if(d===null)return{texto:"Sin fecha",color:"#6B7280",bg:"#F3F4F6"};
  if(d<0)return{texto:"Vencida",color:"#DC2626",bg:"#FEE2E2"};
  if(d===0)return{texto:"Hoy",color:"#D97706",bg:"#FEF3C7"};
  if(d<=2)return{texto:"En "+d+"d",color:"#D97706",bg:"#FEF3C7"};
  return{texto:"En "+d+"d",color:"#059669",bg:"#ECFDF5"};
}
function colorEstadoVenta(e){
  const m={confirmado:{bg:"#DBEAFE",color:"#2563EB"},preparando:{bg:"#FEF3C7",color:"#D97706"},listo:{bg:"#D1FAE5",color:"#059669"},entregado:{bg:"#F0FDF4",color:"#166534"},cancelado:{bg:"#FEE2E2",color:"#DC2626"}};
  return m[e]||{bg:"#F3F4F6",color:"#6B7280"};
}
function generarTracking(){
  const d=new Date();
  const y=d.getFullYear().toString().slice(2);
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  const r=Math.floor(1000+Math.random()*9000);
  return`KLV-${y}${m}${day}-${r}`;
}
function toast(t,tipo="ok"){
  const z=document.getElementById("toast-zona");
  const bg=tipo==="err"?"#DC2626":"var(--navy)";
  z.innerHTML=`<div class="toast" style="background:${bg}">${esc(t)}</div>`;
  setTimeout(()=>{z.innerHTML="";},3200);
}
function ir(v){vista=v;render();}

// ═══════════════════════════════════════════════════════
// SUPABASE — CRUD
// ═══════════════════════════════════════════════════════
async function cargarSocios(){const{data}=await supa.from("socios").select("*").order("id");socios=data||[];}
async function cargarTareas(){const{data}=await supa.from("tareas").select("*").order("id",{ascending:false});tareas=data||[];}
async function cargarPosts(){const{data}=await supa.from("posts").select("*").order("fecha");posts=data||[];}
async function cargarEngagement(){const{data}=await supa.from("engagement").select("*");engagement=data||[];}
async function cargarProductos(){const{data,error}=await supa.from("productos").select("*").order("categoria").order("nombre");if(!error)productos=data||[];}
async function cargarVentas(){const{data,error}=await supa.from("ventas").select("*").order("created_at",{ascending:false});if(!error)ventas=data||[];}

async function crearTarea(t){
  await supa.from("tareas").insert([{titulo:t.titulo,detalle:t.detalle,area:t.area,asignado_id:t.asignado_id||null,estado:"pendiente",fecha_entrega:t.fecha_entrega||null}]);
  await cargarTareas();toast("Tarea creada");vista="tablero";render();
}
async function crearPost(p){
  await supa.from("posts").insert([{titulo:p.titulo,descripcion:p.descripcion,plataforma:p.plataforma,tipo_contenido:p.tipo_contenido,fecha:p.fecha,hora:p.hora||"12:00",ideas_ref:p.ideas_ref||"",estado:"pendiente"}]);
  await cargarPosts();toast("Post planificado para "+p.fecha);vista="marketing";render();
}
async function setEstado(id,estado){await supa.from("tareas").update({estado}).eq("id",id);await cargarTareas();render();}
async function setAsignado(id,asignado_id){await supa.from("tareas").update({asignado_id:asignado_id||null}).eq("id",id);await cargarTareas();render();}
async function setFecha(id,fecha){await supa.from("tareas").update({fecha_entrega:fecha||null}).eq("id",id);await cargarTareas();render();}
async function borrarTarea(id){await supa.from("tareas").delete().eq("id",id);await cargarTareas();render();}
async function borrarPost(id){await supa.from("posts").delete().eq("id",id);await cargarPosts();render();}

// Productos
async function crearProducto(p){
  const{error}=await supa.from("productos").insert([p]);
  if(error){toast("Error al guardar: tablas no creadas aún. Revisá la configuración de Supabase.","err");return;}
  await cargarProductos();toast("Producto guardado");render();
}
async function editarProducto(id,p){
  await supa.from("productos").update(p).eq("id",id);
  await cargarProductos();toast("Producto actualizado");render();
}
async function borrarProducto(id){
  await supa.from("productos").delete().eq("id",id);
  await cargarProductos();toast("Producto eliminado");render();
}

// Ventas
async function crearVenta(v){
  const code=generarTracking();

  const{error}=await supa.from("ventas").insert([v]);

  await cargarVentas();

async function actualizarEstadoVenta(id,estado){
  await supa.from("ventas").update({estado}).eq("id",id);
  await cargarVentas();toast("Estado actualizado → "+estado);render();
}
async function borrarVenta(id){
  await supa.from("ventas").delete().eq("id",id);
  await cargarVentas();render();
}

// ═══════════════════════════════════════════════════════
// CLAUDE API — IA de Marketing
// ═══════════════════════════════════════════════════════
function getClaudeKey(){return localStorage.getItem("klavo_claude_key")||"";}
function setClaudeKey(k){localStorage.setItem("klavo_claude_key",k);}

// ── Markdown simple para respuestas de Claude ──────────
function renderMd(txt){
  return txt
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*\*(.+?)\*\*/g,"<b>$1</b>")
    .replace(/\*(.+?)\*/g,"<em>$1</em>")
    .replace(/^#{1,3}\s+(.+)$/gm,"<p style='font-weight:700;margin:8px 0 4px'>$1</p>")
    .replace(/^[-•]\s+(.+)$/gm,"<li style='margin-left:16px;margin-bottom:3px'>$1</li>")
    .replace(/(<li.*<\/li>\n?)+/g,m=>`<ul style='padding:4px 0'>${m}</ul>`)
    .replace(/\n{2,}/g,"</p><p style='margin-top:8px'>")
    .replace(/\n/g,"<br>");
}

PRODUCTOS ACTUALES EN CATÁLOGO:
${prods||"(catálogo pendiente de carga)"}

CANALES DE VENTA: WhatsApp, Instagram, Facebook Marketplace, TikTok.
MÉTODO DE PAGO: SINPE Móvil, BAC Link, Onvopay.
MERCADO: Costa Rica. Clientes 18-45 años.
COMPETIDORES: Siman, Aromática, Perfutopia, Fischel, Ópticas Münkel.
VENTAJA: Precios más bajos que la competencia con productos 100% originales.

REGLAS:
- Respondé siempre en español costarricense
- Posts: incluí emojis, hashtags #PerfumesCostaRica #KlavoFragancias y CTA con WhatsApp/SINPE
- Horarios óptimos CR: 8AM, 12:30PM, 6PM, 9PM
- Cuando generés un caption, estructuralo: Hook → Beneficio → Precio → CTA
- Sé conciso y accionable`;

async function llamarClaude(mensajeUsuario, sinHistorial=false){
  const key=getClaudeKey();
  if(!key){return"⚙️ Configurá tu clave de API en la pestaña IA Klavo → Configurar API.";}
  if(!sinHistorial){chatLoading=true;render();}
  try{
    const msgs=sinHistorial?[{role:"user",content:mensajeUsuario}]:chatHistory.concat([{role:"user",content:mensajeUsuario}]);
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,system:buildSystemPrompt(),messages:msgs})
    });
    const data=await res.json();
    if(data.error){if(!sinHistorial)chatLoading=false;return"Error: "+data.error.message;}
    const respuesta=data.content[0].text;
    if(!sinHistorial){
      chatHistory.push({role:"user",content:mensajeUsuario});
      chatHistory.push({role:"assistant",content:respuesta});
      if(chatHistory.length>20)chatHistory=chatHistory.slice(-20);
      chatLoading=false;
    }
    return respuesta;
  }catch(e){if(!sinHistorial)chatLoading=false;return"Error de conexión. Verificá tu clave API.";}
}

function abrirCalendarioFlot(){

  const anio=hoy.getFullYear();
  const mes=hoy.getMonth();
  renderCalFlot(anio,mes);
}

function renderCalFlot(anio,mes){
  const meses=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const dias=["D","L","M","M","J","V","S"];
  const primerDia=new Date(anio,mes,1).getDay();
  const totalDias=new Date(anio,mes+1,0).getDate();
  const hoy=new Date();
  const postsFechas=new Set(posts.map(p=>p.fecha));
  const ventasFechas=new Set(ventas.map(v=>v.fecha));

  let grid='';
  dias.forEach(d=>{grid+=`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--gris);padding:4px 0">${d}</div>`;});
  for(let i=0;i<primerDia;i++)grid+=`<div></div>`;
  for(let d=1;d<=totalDias;d++){
    const iso=`${anio}-${String(mes+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const esHoy=d===hoy.getDate()&&mes===hoy.getMonth()&&anio===hoy.getFullYear();
    const tienePost=postsFechas.has(iso);
    const tieneVenta=ventasFechas.has(iso);
    let bg="transparent",color="inherit",fw="400";
    if(esHoy){bg="var(--naranja)";color="#fff";fw="700";}
    else if(tieneVenta){bg="#D1FAE5";color="#065F46";fw="600";}
    else if(tienePost){bg="#DBEAFE";color="#1D4ED8";fw="600";}
    grid+=`<div style="text-align:center;padding:5px 2px;border-radius:6px;font-size:12px;background:${bg};color:${color};font-weight:${fw};cursor:default" title="${tieneVenta?"💰 Venta":tienePost?"📢 Post":""}">${d}</div>`;
  }

  document.getElementById("modal-zona").innerHTML=`
  <div class="modal-bg" onclick="cerrarModal(event)">
  <div class="modal" style="max-width:320px" onclick="event.stopPropagation()">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <button onclick="renderCalFlot(${mes===0?anio-1:anio},${mes===0?11:mes-1})" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--gris)">‹</button>
      <b style="font-size:15px">${meses[mes]} ${anio}</b>
      <button onclick="renderCalFlot(${mes===11?anio+1:anio},${mes===11?0:mes+1})" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--gris)">›</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${grid}</div>
    <div style="display:flex;gap:10px;margin-top:12px;font-size:11px;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:4px"><span style="background:var(--naranja);width:10px;height:10px;border-radius:50%;display:inline-block"></span>Hoy</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="background:#D1FAE5;width:10px;height:10px;border-radius:50%;display:inline-block"></span>Venta</span>
      <span style="display:flex;align-items:center;gap:4px"><span style="background:#DBEAFE;width:10px;height:10px;border-radius:50%;display:inline-block"></span>Post</span>
    </div>
    <button onclick="cerrarModal()" class="btn btn-ghost btn-sm" style="margin-top:14px;width:100%">Cerrar</button>
  </div></div>`;
}

async function subirImagenProducto(file, prodId){
  const ext=file.name.split(".").pop();
  const path=`productos/${Date.now()}_${prodId||"nuevo"}.${ext}`;
  const{data,error}=await supa.storage.from("klavo").upload(path,file,{upsert:true,contentType:file.type});
  if(error){
    toast("Error al subir imagen. Creá el bucket 'klavo' en Supabase Storage → Public","err");
    return null;
  }
  const{data:urlData}=supa.storage.from("klavo").getPublicUrl(path);
  return urlData.publicUrl;
}

async function subirFotosLote(input){
  const files=[...input.files];
  if(!files.length)return;

  // Mostrar panel de progreso
  const zona=document.getElementById("loteResultado");
  zona.innerHTML=`<div class="card" style="border:2px solid var(--naranja);margin-bottom:16px">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:12px">🖼 Subiendo ${files.length} foto${files.length>1?"s":""}...</h3>
    <div id="loteItems"></div>
    <div class="upload-bar" style="margin-top:10px"><div class="upload-bar-fill" id="loteBarra" style="width:0%"></div></div>
    <p id="loteStatus" style="font-size:12px;color:var(--gris);margin-top:8px">Procesando...</p>
  </div>`;

  let ok=0, noEncontrado=[], errores=[];

  for(let i=0;i<files.length;i++){
    const file=files[i];
    // Nombre del archivo sin extensión, normalizado
    const nombreArchivo=file.name.replace(/\.[^/.]+$/,"").toLowerCase().trim();

    // Buscar producto cuyo nombre coincida (flexible)
    const prod=productos.find(p=>{
      const n=p.nombre.toLowerCase().trim();
      return n===nombreArchivo ||
             n.includes(nombreArchivo) ||
             nombreArchivo.includes(n) ||
             similitud(n,nombreArchivo)>0.75;
    });

    // Actualizar UI
    const itemsEl=document.getElementById("loteItems");
    if(itemsEl){
      itemsEl.innerHTML+=`<div id="lote_${i}" style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--linea);font-size:12px">
        <span style="font-size:16px">⏳</span>
        <span style="flex:1">${esc(file.name)}</span>
        <span id="lote_st_${i}" style="color:var(--gris)">Buscando...</span>
      </div>`;
    }

    const stEl=()=>document.getElementById("lote_st_"+i);
    const rowEl=()=>document.getElementById("lote_"+i);

    if(!prod){
      noEncontrado.push(file.name);
      if(stEl())stEl().textContent="⚠️ Sin coincidencia";
      if(rowEl())rowEl().querySelector("span").textContent="⚠️";
    } else {
      if(stEl())stEl().textContent="Subiendo...";
      const url=await subirImagenProducto(file,prod.id);
      if(url){
        await supa.from("productos").update({imagen_url:url}).eq("id",prod.id);
        // Actualizar local
        const idx=productos.findIndex(x=>x.id===prod.id);
        if(idx>-1)productos[idx].imagen_url=url;
        ok++;
        if(stEl())stEl().innerHTML=`<span style="color:#059669">✅ ${esc(prod.nombre)}</span>`;
        if(rowEl())rowEl().querySelector("span").textContent="✅";
      } else {
        errores.push(file.name);
        if(stEl())stEl().innerHTML=`<span style="color:#DC2626">❌ Error al subir</span>`;
      }
    }

    // Barra de progreso
    const pct=Math.round(((i+1)/files.length)*100);
    const b=document.getElementById("loteBarra");
    if(b)b.style.width=pct+"%";
    const s=document.getElementById("loteStatus");
    if(s)s.textContent=`${i+1} de ${files.length} procesadas...`;
  }

  // Resumen final
  const s=document.getElementById("loteStatus");
  if(s)s.innerHTML=`<b style="color:#059669">✅ ${ok} foto${ok!==1?"s":""} asignada${ok!==1?"s":""}</b>${noEncontrado.length?` · <span style="color:#D97706">⚠️ ${noEncontrado.length} sin coincidencia</span>`:""}${errores.length?` · <span style="color:#DC2626">❌ ${errores.length} con error</span>`:""}`;

  // Botón para cerrar y mostrar qué no coincidió
  const zona2=document.getElementById("loteResultado");
  if(noEncontrado.length&&zona2){
    zona2.querySelector(".card").innerHTML+=`
    <div style="margin-top:10px;padding:10px;background:#FEF3C7;border-radius:8px;font-size:12px">
      <b>Archivos sin coincidencia</b> — renombralos igual al producto:<br>
      <span style="color:#92400E">${noEncontrado.map(n=>esc(n)).join(", ")}</span>
    </div>`;
  }
  if(zona2){
    zona2.querySelector(".card").innerHTML+=`<button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="document.getElementById('loteResultado').innerHTML='';render()">Cerrar y actualizar</button>`;
  }

  await cargarProductos();
  input.value=""; // reset input
}

// Calcula similitud entre dos strings (0 a 1)
function similitud(a,b){
  if(a===b)return 1;
  if(a.length<2||b.length<2)return 0;
  const bigrams=new Map();
  for(let i=0;i<a.length-1;i++){const bg=a.slice(i,i+2);bigrams.set(bg,(bigrams.get(bg)||0)+1);}
  let intersect=0;
  for(let i=0;i<b.length-1;i++){const bg=b.slice(i,i+2);if(bigrams.get(bg)>0){intersect++;bigrams.set(bg,bigrams.get(bg)-1);}}
  return(2*intersect)/(a.length+b.length-2);
}

function previewImagenForm(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const wrap=document.getElementById("imgPreviewWrap");
    wrap.innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:cover">`;
  };
  reader.readAsDataURL(file);
  imagenPendienteURL="__file__"; // señal de que hay archivo pendiente
}

function actualizarPreviewURL(url){
  if(!url)return;
  const wrap=document.getElementById("imgPreviewWrap");
  wrap.innerHTML=`<img src="${esc(url)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`;
  imagenPendienteURL=url;
}

async function resolverImagen(prodId){
  // Si hay archivo seleccionado, subirlo primero
  const fileInput=document.getElementById("pImgFile");
  if(fileInput&&fileInput.files[0]){
    const url=await subirImagenProducto(fileInput.files[0],prodId);
    return url;
  }
  // Si hay URL manual
  const urlInput=document.getElementById("pImgURL");
  if(urlInput&&urlInput.value.trim())return urlInput.value.trim();
  return imagenPendienteURL&&imagenPendienteURL!=="__file__"?imagenPendienteURL:null;
}

function editarProdForm(id){const p=productos.find(x=>x.id===id);if(p)mostrarFormProd(p);}

async function guardarNuevoProd(){
  const nom=document.getElementById("pNombre").value.trim();if(!nom)return;
  toast("Guardando...");
  // Primero insertar para obtener el ID
  const{data,error}=await supa.from("productos").insert([{
    nombre:nom,
    categoria:document.getElementById("pCat").value,
    stock:parseInt(document.getElementById("pStock").value)||0,
    costo_usd:parseFloat(document.getElementById("pCosto").value)||null,
    precio_venta:parseInt(document.getElementById("pPrecio").value)||null,
    descripcion:document.getElementById("pDesc").value.trim()
  }]).select().single();
  if(error){toast("Error al guardar","err");return;}
  // Subir imagen si hay
  const imgUrl=await resolverImagen(data.id);
  if(imgUrl&&imgUrl!=="__file__"){
    await supa.from("productos").update({imagen_url:imgUrl}).eq("id",data.id);
  }
  await cargarProductos();
  imagenPendienteURL=null;
  toast("✅ Producto guardado");
  render();
}

async function guardarEdicionProd(id){
  const nom=document.getElementById("pNombre").value.trim();if(!nom)return;
  toast("Guardando...");
  const imgUrl=await resolverImagen(id);
  const updates={
    nombre:nom,
    categoria:document.getElementById("pCat").value,
    stock:parseInt(document.getElementById("pStock").value)||0,
    costo_usd:parseFloat(document.getElementById("pCosto").value)||null,
    precio_venta:parseInt(document.getElementById("pPrecio").value)||null,
    descripcion:document.getElementById("pDesc").value.trim()
  };
  if(imgUrl&&imgUrl!=="__file__")updates.imagen_url=imgUrl;
  await editarProducto(id,updates);
  imagenPendienteURL=null;
}

async function quitarImagenProd(id){

}
function mostrarImportCSV(){
  document.getElementById("modal-zona").innerHTML=`
  <div class="modal-bg" onclick="cerrarModal(event)"><div class="modal">
    <h2>📥 Importar productos desde CSV</h2>
    <p>Exportá tu Excel como CSV y pegá el contenido acá. Formato:<br><b>nombre,categoria,costo_usd,precio_venta,stock,descripcion</b></p>
    <textarea id="csvText" rows="8" placeholder="Lattafa Yara 100ml,Perfumes,18.50,28000,5,Fragancia árabe femenina viral&#10;NY Yankees New Era,Gorras,20,35000,3,Gorra 9FORTY ajustable"></textarea>
    <div style="display:flex;gap:8px"><button class="btn btn-naranja" onclick="procesarCSV()">Importar</button><button class="btn btn-ghost" onclick="cerrarModal()">Cancelar</button></div>
  </div></div>`;
}
async function procesarCSV(){
  const raw=document.getElementById("csvText").value.trim();
  const lines=raw.split("\n").filter(l=>l.trim());
  let ok=0;
  for(const line of lines){
    const parts=line.split(",");
    if(parts.length<2)continue;
    const [nombre,categoria,costo_usd,precio_venta,stock,descripcion]=parts;
    if(!nombre.trim())continue;
    await supa.from("productos").insert([{nombre:nombre.trim(),categoria:(categoria||"Otro").trim(),costo_usd:parseFloat(costo_usd)||null,precio_venta:parseInt(precio_venta)||null,stock:parseInt(stock)||0,descripcion:(descripcion||"").trim()}]);
    ok++;
  }
  await cargarProductos();
  cerrarModal();
  toast(`${ok} productos importados`);
  render();
}

// ═══════════════════════════════════════════════════════
// TAREAS (original preservado)
// ═══════════════════════════════════════════════════════
function seccionTareas(){
  const c=conteos();
  let vis=tareas.filter(t=>(filtroSocio==="todos"||String(t.asignado_id)===filtroSocio)&&(filtroEstado==="todos"||t.estado===filtroEstado));
  let html=`<div class="grid4"><div class="card conteo"><div class="n" style="color:#D97706">${c.pendiente}</div><div class="l">Pendientes</div></div><div class="card conteo"><div class="n" style="color:#2563EB">${c.progreso}</div><div class="l">En progreso</div></div><div class="card conteo"><div class="n" style="color:#059669">${c.logrado}</div><div class="l">Logradas</div></div><div class="card conteo"><div class="n" style="color:#DC2626">${c.vencidas}</div><div class="l">Vencidas</div></div></div>`;
  html+=`<div class="filtros"><select onchange="filtroSocio=this.value;render()"><option value="todos">Todos los socios</option>${socios.map(s=>`<option value="${s.id}"${filtroSocio===String(s.id)?" selected":""}>${esc(s.nombre)}</option>`).join("")}</select><select onchange="filtroEstado=this.value;render()"><option value="todos">Todos los estados</option><option value="pendiente"${filtroEstado==="pendiente"?" selected":""}>Pendiente</option><option value="progreso"${filtroEstado==="progreso"?" selected":""}>En progreso</option><option value="logrado"${filtroEstado==="logrado"?" selected":""}>Logrado</option></select></div>`;
  if(vis.length===0)html+=`<div class="card" style="text-align:center;padding:40px"><p style="color:var(--gris)">No hay tareas</p></div>`;
  else vis.forEach(t=>{html+=tareaCard(t);});
  return html;
}
function tareaCard(t){
  const ef=estadoFecha(t.fecha_entrega,t.estado);
  let html=`<div class="card"><div class="tarea-top"><div style="flex:1;min-width:0"><span class="pill" style="background:#F1F5F9;color:#475569">${esc(t.area||"General")}</span><span class="pill" style="background:${ef.bg};color:${ef.color};margin-left:6px">${ef.texto}</span><h3>${esc(t.titulo)}</h3>`;
  if(t.detalle)html+=`<p>${esc(t.detalle)}</p>`;
  html+=`</div><button class="x" onclick="borrarTarea(${t.id})">×</button></div><div style="margin-top:10px">`;
  ['pendiente','progreso','logrado'].forEach(e=>{
    const colores={pendiente:"#FEF3C7,#D97706,#D97706",progreso:"#DBEAFE,#2563EB,#2563EB",logrado:"#D1FAE5,#059669,#059669"};
    const [bg,col,bor]=colores[e].split(",");
    html+=`<button class="estado-btn" ${t.estado===e?`style="background:${bg};color:${col};border-color:${bor}"`:""} onclick="setEstado(${t.id},'${e}')">${e==="pendiente"?"Pendiente":e==="progreso"?"En progreso":"Logrado"}</button>`;
  });
  html+=`</div><div class="meta"><div style="display:flex;align-items:center;gap:6px"><small>Asignado a</small><select onchange="setAsignado(${t.id},this.value)" style="width:auto;margin:0;padding:4px 7px;font-size:11px"><option value="">Sin asignar</option>${socios.map(s=>`<option value="${s.id}"${String(t.asignado_id)===String(s.id)?" selected":""}>${esc(s.nombre)}</option>`).join("")}</select></div><div style="display:flex;align-items:center;gap:6px"><small>Entrega</small><input type="date" style="width:auto;margin:0;padding:4px 7px;font-size:11px" value="${t.fecha_entrega||""}" onchange="setFecha(${t.id},this.value)"></div></div></div>`;
  return html;
}
function seccionNuevaTarea(){
  let html=`<div class="card" style="max-width:640px"><h2 style="font-weight:600;margin-bottom:16px">Nueva tarea</h2><label>Título</label><input id="ntTitulo" placeholder="Ej. Publicar 3 reels de Lattafa esta semana"><label>Detalle (opcional)</label><textarea id="ntDetalle" rows="2"></textarea><label>Asignar a</label><select id="ntAsignado"><option value="">Sin asignar</option>${socios.map(s=>`<option value="${s.id}">${esc(s.nombre)}</option>`).join("")}</select><div class="row2"><div><label>Área</label><select id="ntArea">${CATEGORIAS_TAREA.map(c=>`<option>${c}</option>`).join("")}</select></div><div><label>Fecha de entrega</label><input type="date" id="ntFecha"></div></div>${socios.length===0?'<div style="background:#FFF3EA;color:#9A4310;font-size:12px;padding:9px 11px;border-radius:9px;margin-bottom:12px">Agrega socios primero.</div>':''}<div style="display:flex;gap:10px"><button class="btn btn-naranja" onclick="enviarNuevaTarea()">Crear tarea</button><button class="btn btn-ghost" onclick="ir('tablero')">Cancelar</button></div></div>`;

// ═══════════════════════════════════════════════════════
// SOCIOS
// ═══════════════════════════════════════════════════════
function seccionSocios(){
  formRoles=formRoles||[];
  let chips="";CATEGORIAS_TAREA.forEach(c=>{chips+=`<button class="chip ${formRoles.includes(c)?"on":""}" onclick="toggleRolForm('${c}')">${c}</button>`;});
  let html=`<div class="card"><h2 style="font-weight:600;margin-bottom:12px">Agregar socio</h2><input id="nuevoNombre" placeholder="Nombre del socio"><p style="font-size:12px;color:var(--gris);margin-bottom:8px">Áreas que maneja:</p><div style="margin-bottom:12px">${chips}</div><button class="btn btn-naranja" onclick="guardarNuevoSocio()">Agregar socio</button></div><p style="font-size:12px;color:#94A3B8;margin-bottom:10px">Tocá un socio para editarlo.</p><div id="editZona"></div>`;
  socios.forEach(s=>{html+=`<button class="card" style="width:100%;text-align:left;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="abrirEditar(${s.id})"><div><div style="font-weight:600">${esc(s.nombre)}</div><div style="font-size:12px;color:var(--gris);margin-top:2px">${rolesArr(s).join(" · ")||"Sin áreas"}</div></div><span style="font-size:12px;color:#94A3B8">Editar ›</span></button>`;});
  return html;
}
function toggleRolForm(c){if(formRoles.includes(c)){formRoles=formRoles.filter(x=>x!==c);}else{formRoles.push(c);}render();}
function guardarNuevoSocio(){const n=document.getElementById("nuevoNombre").value.trim();if(!n)return;agregarSocio(n,formRoles.length?formRoles.slice():["General"]);formRoles=[];}
function abrirEditar(id){const s=socios.find(x=>String(x.id)===String(id));if(!s)return;const roles=rolesArr(s);let chips="";CATEGORIAS_TAREA.forEach(c=>{chips+=`<button class="chip ${roles.includes(c)?"on":""}" data-rol="${c}" onclick="this.classList.toggle('on')">${c}</button>`;});document.getElementById("editZona").innerHTML=`<div class="card" style="border:2px solid var(--naranja)"><input id="editNombre" value="${esc(s.nombre)}"><div style="margin-bottom:12px" id="editChips">${chips}</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-naranja" onclick="guardarEdicion(${id})">Guardar</button><button class="btn btn-ghost" onclick="render()">Cancelar</button><button class="btn" style="background:#fff;color:#DC2626;border:1px solid #FCA5A5;margin-left:auto" onclick="borrarSocio(${id})">Eliminar</button></div></div>`;document.getElementById("editZona").scrollIntoView({behavior:"smooth"});}
function guardarEdicion(id){const n=document.getElementById("editNombre").value.trim();if(!n)return;const roles=[...document.querySelectorAll("#editChips .chip.on")].map(b=>b.dataset.rol);editarSocio(id,n,roles.length?roles:["General"]);}
async function agregarSocio(nombre,roles){await supa.from("socios").insert([{nombre,roles:roles.join(",")}]);await cargarSocios();toast(`Socio "${nombre}" agregado`);}
async function editarSocio(id,nombre,roles){await supa.from("socios").update({nombre,roles:roles.join(",")}).eq("id",id);await cargarSocios();toast("Socio actualizado");render();}
async function borrarSocio(id){await supa.from("socios").delete().eq("id",id);await cargarSocios();render();}

// ═══════════════════════════════════════════════════════
// TRANSPARENCIA
// ═══════════════════════════════════════════════════════
function seccionTransparencia(){
  const c=conteos();const total=tareas.length;const pct=total?Math.round((c.logrado/total)*100):0;
  let html=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-end"><div><div style="font-size:12px;color:var(--gris)">Avance general del equipo</div><div style="font-size:34px;font-weight:700">${pct}%</div></div><div style="font-size:12px;color:var(--gris);text-align:right">${c.logrado} de ${total} logradas</div></div><div class="barra"><div style="width:${pct}%;background:#059669"></div></div></div>
  <h2 style="font-size:12px;color:var(--gris);text-transform:uppercase;letter-spacing:1px;margin:6px 0 10px">Carga por socio</h2>`;
  if(socios.length===0)html+=`<p style="color:var(--gris);font-size:14px">Agrega socios para ver la distribución.</p>`;
  else{
    const ps=socios.map(s=>{const suyas=tareas.filter(t=>String(t.asignado_id)===String(s.id));return{nombre:s.nombre,total:suyas.length,pendiente:suyas.filter(t=>t.estado==="pendiente").length,progreso:suyas.filter(t=>t.estado==="progreso").length,logrado:suyas.filter(t=>t.estado==="logrado").length,vencidas:suyas.filter(t=>t.estado!=="logrado"&&diasRestantes(t.fecha_entrega)<0).length};});
    const maxT=Math.max(1,...ps.map(p=>p.total));
    ps.forEach(p=>{html+=`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:5px"><b>${esc(p.nombre)}</b><span style="color:var(--gris);font-size:13px">${p.total} tareas</span></div><div class="barra"><div style="width:${(p.total/maxT)*100}%;background:var(--naranja)"></div></div><div style="display:flex;flex-wrap:wrap;gap:10px;font-size:11px"><span style="color:#D97706">● ${p.pendiente} pendientes</span><span style="color:#2563EB">● ${p.progreso} en progreso</span><span style="color:#059669">● ${p.logrado} logradas</span>${p.vencidas>0?`<span style="color:#DC2626">● ${p.vencidas} vencidas</span>`:""}</div></div>`;});
  }
  return html;
}

// SETUP — Guía de tablas Supabase

function seccionSetup(){
  const sql=`-- Corré este SQL en Supabase > SQL Editor
-- Tablas ya existentes: socios, tareas, posts, engagement

CREATE TABLE IF NOT EXISTS productos (
  id bigserial PRIMARY KEY,
  nombre text NOT NULL,
  categoria text DEFAULT 'Perfumes',
  descripcion text,
  costo_usd numeric(10,2),
  precio_venta integer,

  activo boolean DEFAULT true,
  created_at timestamptz DEFAULT now()
);

CREATE TABLE IF NOT EXISTS ventas (
  id bigserial PRIMARY KEY,
  tracking_code text UNIQUE,
  cliente_nombre text,
  cliente_telefono text,
  producto_id bigint,
  producto_nombre text,
  cantidad integer DEFAULT 1,
  precio_unit integer,
  total integer,
  canal text DEFAULT 'WhatsApp',
  metodo_pago text DEFAULT 'SINPE Móvil',
  referencia_pago text,
  estado text DEFAULT 'confirmado',
  notas text,
  fecha date DEFAULT CURRENT_DATE,
  created_at timestamptz DEFAULT now()
);

-- Habilitar RLS (Row Level Security)
ALTER TABLE productos ENABLE ROW LEVEL SECURITY;
ALTER TABLE ventas ENABLE ROW LEVEL SECURITY;

-- Políticas de acceso público (ajustá según tus necesidades)
CREATE POLICY "Allow all" ON productos FOR ALL USING (true) WITH CHECK (true);
CREATE POLICY "Allow all" ON ventas FOR ALL USING (true) WITH CHECK (true);`;
  return`<div style="max-width:640px">
    <h2 style="font-size:18px;font-weight:600;margin-bottom:6px">⚙️ Setup de tablas Supabase</h2>
    <p style="font-size:13px;color:var(--gris);margin-bottom:16px">Para usar Catálogo y Ventas, creá estas tablas en tu proyecto Supabase.</p>
    <div class="card">
      <p style="font-size:13px;font-weight:600;margin-bottom:8px">1. Abrí Supabase → SQL Editor</p>
      <p style="font-size:13px;font-weight:600;margin-bottom:6px">2. Pegá y ejecutá este SQL:</p>
      <pre class="sql">${esc(sql)}</pre>
      <div style="display:flex;gap:8px">
        <button class="btn btn-naranja" onclick="navigator.clipboard.writeText(document.querySelector('pre.sql').textContent).then(()=>toast('SQL copiado'))">📋 Copiar SQL</button>
        <a href="https://supabase.com/dashboard" target="_blank" class="btn btn-navy" style="text-decoration:none">→ Abrir Supabase</a>
      </div>
    </div>
    <div class="card" style="margin-top:12px">
      <p style="font-size:13px;font-weight:600;margin-bottom:6px">3. Configurar SINPE</p>
      <p style="font-size:13px;color:var(--gris)">En el código HTML, buscá <code>const SINPE_NUMERO</code> y cambiá el número al tuyo. Actualmente: <b>${SINPE_NUMERO}</b></p>
    </div>
    <div class="card" style="margin-top:12px">
      <p style="font-size:13px;font-weight:600;margin-bottom:6px">4. API de Claude (IA Klavo)</p>
      <p style="font-size:13px;color:var(--gris);margin-bottom:10px">Para usar el asesor de marketing IA, necesitás una clave de Anthropic.</p>
      <a href="https://console.anthropic.com" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none;margin-right:8px">→ Obtener clave API</a>
      <button class="btn btn-ghost btn-sm" onclick="configurarAPIKey()">Configurar ahora</button>
    </div>
    <div class="card" style="margin-top:12px">
      <p style="font-size:13px;font-weight:600;margin-bottom:6px">5. Bucket de imágenes (Supabase Storage)</p>
      <p style="font-size:13px;color:var(--gris);margin-bottom:10px">Para subir fotos de productos necesitás crear un bucket público en Supabase Storage.</p>
      <pre class="sql">-- En Supabase → Storage → New bucket
-- Nombre: klavo
-- Public bucket: ✅ activado
-- Luego en SQL Editor ejecutá:
CREATE POLICY "Public read" ON storage.objects FOR SELECT USING (bucket_id = 'klavo');
CREATE POLICY "Auth upload" ON storage.objects FOR INSERT WITH CHECK (bucket_id = 'klavo');</pre>
      <a href="https://supabase.com/dashboard" target="_blank" class="btn btn-ghost btn-sm" style="text-decoration:none">→ Abrir Supabase Storage</a>
    </div>
    <button class="btn btn-ghost" style="margin-top:12px" onclick="ir('tablero')">← Volver al Dashboard</button>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// INICIAR
// ═══════════════════════════════════════════════════════
async function iniciar(){
  // Si es página de tracking pública, no necesita auth completo
  const urlParams=new URLSearchParams(window.location.search);
  const trackCode=urlParams.get("tracking");
  if(trackCode){
    supa=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    renderPaginaTracking(trackCode);
    return;
  }
  if(!configurado){render();return;}
  supa=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
  await Promise.all([cargarSocios(),cargarTareas(),cargarPosts(),cargarEngagement()]);
  // Tablas nuevas — silencioso si no existen
  await cargarProductos().catch(()=>{});
  await cargarVentas().catch(()=>{});
  render();
  supa.channel("klavo-rt")
    .on("postgres_changes",{event:"*",schema:"public",table:"socios"},()=>{cargarSocios().then(render);})
    .on("postgres_changes",{event:"*",schema:"public",table:"tareas"},()=>{cargarTareas().then(render);})
    .on("postgres_changes",{event:"*",schema:"public",table:"posts"},()=>{cargarPosts().then(render);})
    .on("postgres_changes",{event:"*",schema:"public",table:"ventas"},()=>{cargarVentas().then(render);})
    .subscribe();
}
iniciar();
</script>
