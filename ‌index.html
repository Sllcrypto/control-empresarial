function fmtDate(d){if(!d)return"—";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;}
function fmtHora(ts){if(!ts)return"—";return new Date(ts).toLocaleTimeString("es-CR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}
function fmtFecha(ts){if(!ts)return"—";return new Date(ts).toLocaleDateString("es-CR",{day:"2-digit",month:"2-digit",year:"numeric"});}
function duracion(ini){const ms=Date.now()-ini;const m=Math.floor(ms/60000);const s=Math.floor((ms%60000)/1000);return`${m}m ${s.toString().padStart(2,"0")}s`;}
function pasado(ts){return(Date.now()-ts)>LIMITE_CAFE*60*1000;}
function durToMin(dur){
  if(!dur)return 0;
  const s=dur.trim().toLowerCase();
  let total=0;
  // Formatos: "2h 30min", "2h30m", "1h", "30min", "30m", "90", "1:30"
  const hMatch=s.match(/(\d+)\s*h/);
  const mMatch=s.match(/(\d+)\s*m(?:in)?(?!\s*\d)/);
  const colonMatch=s.match(/^(\d+):(\d+)$/);
  if(colonMatch){
    total=parseInt(colonMatch[1])*60+parseInt(colonMatch[2]);
  } else {
    if(hMatch)total+=parseInt(hMatch[1])*60;
    if(mMatch)total+=parseInt(mMatch[1]);
    if(!hMatch&&!mMatch&&!isNaN(parseInt(s)))total=parseInt(s);
  }
  return total;
}
function minToDur(min){
  if(min<=0)return"0min";
  const h=Math.floor(min/60);const m=min%60;
  if(h>0&&m>0)return`${h}h ${m}min`;
  if(h>0)return`${h}h`;
  return`${m}min`;
}

  function detectConflicto(form,excId=null){
    const colab=colabs.find(c=>c.id===parseInt(form.colabId));
    if(!colab||!form.fechaInicio||!form.fechaFin)return null;
    const ini=new Date(form.fechaInicio),fin=new Date(form.fechaFin);
    const msgs=[];
    for(const r of registros){
      if(r.id===excId)continue;
      const otro=colabs.find(c=>c.id===r.colabId);
      if(!otro||otro.area!==colab.area||otro.id===colab.id)continue;
      const rI=new Date(r.fechaInicio),rF=new Date(r.fechaFin);
      if(ini<=rF&&fin>=rI){const esRes=r.estado==="reservado";msgs.push(esRes?`📌 Reserva en ${colab.area}: ${otro.nombre} (${fmtDate(r.fechaInicio)} al ${fmtDate(r.fechaFin)}) — sin confirmar.`:`⚠️ Choque en ${colab.area}: ${otro.nombre} del ${fmtDate(r.fechaInicio)} al ${fmtDate(r.fechaFin)}.`);}
    }
    return msgs.length>0?msgs.join("\n"):null;
  }

            {regsFiltrados.length===0

                  <thead>

                        <th key={h} style={{padding:"10px 11px",textAlign:"left",color:C.naranja,fontSize:10,fontWeight:700,letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {regsFiltrados.map((r,i)=>{
                      const c=getColab(r.colabId);const col=AREA_COLOR[c?.area]||C.textoS;

                            {r.historico&&<span style={{marginLeft:4,background:C.g3,color:C.textoS,borderRadius:10,padding:"2px 6px",fontSize:9,fontWeight:700}}>HIST</span>}
                          </td>
                          <td style={td}>
                            {r.estado==="reservado"
                              ?<span style={{background:"#1E3A5F",color:C.azulL,borderRadius:20,padding:"3px 9px",fontSize:10,fontWeight:700,whiteSpace:"nowrap"}}>📌 Reservado</span>

                          </td>
                          <td style={td}>
                            <button onClick={()=>toggleRRHH(r.id)} style={{padding:"4px 9px",borderRadius:20,border:`1.5px solid ${r.rrhh?C.verde:C.g3}`,background:r.rrhh?"#14532D":"transparent",color:r.rrhh?C.verde:C.textoS,fontSize:10,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>
                              {r.rrhh?"✓ Entregado":"Pendiente"}

                          </td>
                          <td style={td}>
                            <div style={{display:"flex",gap:4}}>
                              {r.estado==="reservado"&&<button onClick={()=>confirmarReservado(r.id)} style={{padding:"4px 7px",borderRadius:6,border:`1px solid ${C.g3}`,background:C.g2,cursor:"pointer",fontSize:12}} title="Confirmar">✅</button>}
                              <button onClick={()=>editReg(r)} style={{padding:"4px 7px",borderRadius:6,border:`1px solid ${C.g3}`,background:C.g2,cursor:"pointer",fontSize:12}}>✏️</button>
                              <button onClick={()=>setDelConfirm({type:"reg",id:r.id})} style={{padding:"4px 7px",borderRadius:6,border:`1px solid ${C.g3}`,background:C.g2,cursor:"pointer",fontSize:12}}>🗑️</button>
                            </div>
                          </td>
                        </tr>

                    })}
                  </tbody>
                </table>
              </div>
            }
            {regsFiltrados.length>0&&(
              <div style={{marginTop:14,display:"flex",gap:8,flexWrap:"wrap"}}>
                {AREAS.map(a=>{const dias=regsFiltrados.filter(r=>getColab(r.colabId)?.area===a).reduce((s,r)=>s+(r.dias||0),0);if(!dias)return null;return(
                  <div key={a} style={{background:C.g1,borderRadius:10,padding:"9px 14px",borderLeft:`4px solid ${AREA_COLOR[a]}`}}>
                    <div style={{fontSize:10,color:C.textoS,textTransform:"uppercase",letterSpacing:1}}>{a}</div>
                    <div style={{fontSize:20,fontWeight:800,color:AREA_COLOR[a]}}>{dias} <span style={{fontSize:11,fontWeight:400,color:C.textoS}}>días</span></div>
                  </div>
                );})}
              </div>
            )}
          </div>
        )}

        {/* ══ CALENDARIO ══ */}
        {view==="calendario"&&(()=>{
          const DS=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
          const primerDia=new Date(calYear,calMonth,1).getDay();
          const diasEnMes=new Date(calYear,calMonth+1,0).getDate();
          function regsEnDia(dia){const fecha=new Date(calYear,calMonth,dia);return registros.filter(r=>{const ini=new Date(r.fechaInicio+"T00:00:00");const fin=new Date(r.fechaFin+"T00:00:00");return fecha>=ini&&fecha<=fin;});}
          function permisosEnDia(dia){
            const fechaStr=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(dia).padStart(2,"0")}`;
            return permisos.filter(p=>p.fecha===fechaStr);
          }
          function incapEnDia(dia){
            const fecha=new Date(calYear,calMonth,dia);
            return incapacidades.filter(i=>{
              const ini=new Date(i.fechaInicio+"T00:00:00");
              const fin=new Date(i.fechaFin+"T00:00:00");
              return fecha>=ini&&fecha<=fin;
            });
          }
          const celdas=[];for(let i=0;i<primerDia;i++)celdas.push(null);for(let d=1;d<=diasEnMes;d++)celdas.push(d);
          const regsDelDia=calDia?regsEnDia(calDia):[];
          const hoy=new Date();
          return(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
                <button onClick={()=>{if(calMonth===0){setCalMonth(11);setCalYear(y=>y-1);}else setCalMonth(m=>m-1);setCalDia(null);}} style={{padding:"8px 16px",borderRadius:8,border:`1.5px solid ${C.g3}`,background:C.g2,cursor:"pointer",fontSize:18,fontWeight:700,color:C.naranja}}>‹</button>
                <div style={{fontWeight:800,fontSize:17,color:C.blanco}}>{MESES[calMonth]} <span style={{color:C.naranja}}>{calYear}</span></div>
                <button onClick={()=>{if(calMonth===11){setCalMonth(0);setCalYear(y=>y+1);}else setCalMonth(m=>m+1);setCalDia(null);}} style={{padding:"8px 16px",borderRadius:8,border:`1.5px solid ${C.g3}`,background:C.g2,cursor:"pointer",fontSize:18,fontWeight:700,color:C.naranja}}>›</button>
              </div>
              <div style={{background:C.g1,borderRadius:14,overflow:"hidden"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",background:C.g2}}>
                  {DS.map(d=><div key={d} style={{padding:"9px 0",textAlign:"center",color:C.naranja,fontSize:10,fontWeight:700}}>{d}</div>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:1,background:C.g3}}>
                  {celdas.map((dia,i)=>{
                    if(!dia)return<div key={i} style={{background:C.g1,minHeight:52}}/>;
                    const regs=regsEnDia(dia);const tieneVac=regs.length>0;
                    const perDia=permisosEnDia(dia);const tienePermisos=perDia.length>0;
                    const incDia=incapEnDia(dia);const tieneIncap=incDia.length>0;
                    const sel=calDia===dia;
                    const esHoy=hoy.getDate()===dia&&hoy.getMonth()===calMonth&&hoy.getFullYear()===calYear;
                    const tieneMarca=tieneVac||tienePermisos||tieneIncap;
                    const bgColor=sel?C.naranja:tieneIncap?"#1A0A1A":tieneVac?"#1A1000":tienePermisos?"#0D1A0D":C.g1;
                    const txtColor=sel?C.blanco:esHoy?C.azulL:tieneIncap?"#C084FC":tieneVac?C.naranja:tienePermisos?"#4ADE80":C.texto;
                    return(
                      <div key={dia} onClick={()=>setCalDia(sel?null:dia)} style={{background:bgColor,minHeight:52,padding:"5px 6px",cursor:tieneMarca?"pointer":"default",outline:esHoy?`2px solid ${C.azulL}`:"none",transition:"background .15s"}}>
                        <div style={{fontSize:12,fontWeight:esHoy?800:500,color:txtColor}}>{dia}</div>
                        {!sel&&(
                          <div style={{marginTop:3,display:"flex",flexWrap:"wrap",gap:2}}>
                            {regs.slice(0,2).map((r,idx)=><div key={idx} style={{width:7,height:7,borderRadius:"50%",background:r.estado==="reservado"?C.azulL:C.naranja}}/>)}
                            {perDia.slice(0,2).map((p,idx)=><div key={"p"+idx} style={{width:7,height:7,borderRadius:2,background:"#4ADE80"}}/>)}
                            {incDia.slice(0,2).map((i,idx)=><div key={"i"+idx} style={{width:7,height:7,borderRadius:"50%",background:"#C084FC"}}/>)}
                            {(regs.length+perDia.length+incDia.length)>4&&<div style={{fontSize:8,color:C.naranja,fontWeight:700}}>+{(regs.length+perDia.length+incDia.length)-4}</div>}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
              {calDia&&(
                <div style={{marginTop:14,background:C.g1,borderRadius:12,padding:"14px"}}>
                  <div style={{fontWeight:800,fontSize:14,color:C.naranja,marginBottom:10}}>{calDia} de {MESES[calMonth]}</div>
                  {regsDelDia.length===0&&(calDia?permisosEnDia(calDia):[]).length===0&&(calDia?incapEnDia(calDia):[]).length===0
                    ?<div style={{color:C.textoS,fontSize:13}}>Sin registros este día.</div>
                    :<div>
                      {regsDelDia.map(r=>{const c=getColab(r.colabId);const col=AREA_COLOR[c?.area]||C.textoS;return(
                        <div key={r.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:`1px solid ${C.g2}`}}>
                          <div style={{width:9,height:9,borderRadius:"50%",background:col,flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:600,fontSize:13}}>{c?.nombre||"—"}</div>
                            <div style={{fontSize:11,color:C.textoS,marginTop:1}}>{c?.area} · Boleta #{r.boleta} · {r.dias} día(s)</div>
                          </div>
                          <span style={{background:r.estado==="reservado"?"#1E3A5F":"#14532D",color:r.estado==="reservado"?C.azulL:C.verde,borderRadius:20,padding:"3px 9px",fontSize:10,fontWeight:700}}>{r.estado==="reservado"?"📌 Reservado":"✓ Confirmado"}</span>
                        </div>
                      );})}
                      {(calDia?permisosEnDia(calDia):[]).map(p=>{const c=getColab(p.colabId);return(
                        <div key={p.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid "+C.g2}}>
                          <div style={{width:9,height:9,borderRadius:2,background:"#4ADE80",flexShrink:0}}/>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:600,fontSize:13}}>{c?.nombre||"—"}</div>
                            <div style={{fontSize:11,color:C.textoS,marginTop:1}}>{"Permiso "+p.motivo+" · "+p.duracion}</div>
                          </div>
                          <span style={{background:"#14532D",color:"#4ADE80",borderRadius:20,padding:"3px 9px",fontSize:10,fontWeight:700}}>{"📝 Permiso"}</span>
                        </div>
                      );})}
                      {(calDia?incapEnDia(calDia):[]).map(i=>{const c=getColab(i.colabId);return(
                        <div key={i.id} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"1px solid "+C.g2}}>

                          <div style={{flex:1}}>

                          </div>
                          <span style={{background:"#2E1065",color:"#C084FC",borderRadius:20,padding:"3px 9px",fontSize:10,fontWeight:700}}>{"🏥 Incapacidad"}</span>
                        </div>
                      );})}
                    </div>
                  }
                </div>
              )}
              <div style={{marginTop:12,display:"flex",gap:14,flexWrap:"wrap"}}>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.textoM}}><div style={{width:9,height:9,borderRadius:"50%",background:C.naranja}}/> Confirmado</div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.textoM}}><div style={{width:9,height:9,borderRadius:"50%",background:C.azulL}}/> Reservado</div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.textoM}}><div style={{width:9,height:9,borderRadius:2,background:"#4ADE80"}}/> Permiso</div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.textoM}}><div style={{width:9,height:9,borderRadius:"50%",background:"#C084FC"}}/> Incapacidad</div>
                <div style={{display:"flex",alignItems:"center",gap:5,fontSize:12,color:C.textoM}}><div style={{width:11,height:11,borderRadius:3,border:`2px solid ${C.azulL}`,background:"transparent"}}/> Hoy</div>
              </div>
            </div>
          );
        })()}

        {/* ══ COLABORADORES ══ */}
        {view==="colaboradores"&&(
          <div>
            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:14}}>
              <button onClick={()=>{setShowColabForm(true);setColabEdit(null);setColabForm({nombre:"",area:AREAS[0],diasAcumulados:0,telefono:""});}} style={btnP}>+ Agregar</button>
            </div>
            {AREAS.map(area=>{
              const del_area=colabs.filter(c=>c.area===area);if(!del_area.length)return null;
              return(
                <div key={area} style={{marginBottom:22}}>
                  <div style={{fontSize:10,color:AREA_COLOR[area],fontWeight:800,letterSpacing:2,textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:7}}>
                    <span style={{display:"inline-block",width:10,height:10,borderRadius:"50%",background:AREA_COLOR[area]}}/>{area}
                  </div>
                  <div style={{display:"grid",gap:7}}>
                    {del_area.map(c=>{
                      const usados=diasUsados(c.id);const rest=saldo(c);const exp=expandedColab===c.id;
                      return(
                        <div key={c.id} style={{background:C.g1,borderRadius:10,borderLeft:`4px solid ${AREA_COLOR[area]}`,overflow:"hidden"}}>
                          <div style={{padding:"11px 14px",display:"flex",alignItems:"center",gap:10}}>
                            <div style={{flex:1}}>
                              <div style={{fontWeight:600,fontSize:13}}>{c.nombre}</div>
                              <div style={{fontSize:11,color:C.textoS,marginTop:2}}>{registros.filter(r=>r.colabId===c.id&&!r.historico).length} registro(s) · {usados} usados · {permisos.filter(p=>p.colabId===c.id).length} permiso(s)</div>
                            </div>
                            <button onClick={()=>setExpandedColab(exp?null:c.id)} style={{padding:"5px 10px",borderRadius:20,border:`1.5px solid ${C.azul}`,background:exp?C.azul:"transparent",color:exp?C.blanco:C.azul,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{exp?"▲":"＋ Ver"}</button>
                            <button onClick={()=>{setColabForm({nombre:c.nombre,area:c.area,diasAcumulados:c.diasAcumulados,telefono:c.telefono||""});setColabEdit(c.id);setShowColabForm(true);}} style={{padding:"4px 7px",borderRadius:6,border:`1px solid ${C.g3}`,background:C.g2,cursor:"pointer",fontSize:12}}>✏️</button>
                            <button onClick={()=>setDelConfirm({type:"colab",id:c.id})} style={{padding:"4px 7px",borderRadius:6,border:`1px solid ${C.g3}`,background:C.g2,cursor:"pointer",fontSize:12}}>🗑️</button>
                          </div>
                          {exp&&(
                            <div style={{borderTop:`1px solid ${C.g2}`,padding:"14px",background:"#0D1117"}}>
                              {/* Saldo */}
                              <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:12}}>
                                {[["Acumulados",c.diasAcumulados,C.naranja],["Usados",usados,C.rojo],["Disponibles",rest,rest<0?C.rojo:C.verde]].map(([label,val,col])=>(
                                  <div key={label} style={{background:col+"15",borderRadius:10,padding:"8px 14px",minWidth:80,textAlign:"center",border:`1.5px solid ${col}30`}}>
                                    <div style={{fontSize:9,color:col,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>{label}</div>
                                    <div style={{fontSize:24,fontWeight:900,color:col}}>{val}</div>
                                    <div style={{fontSize:10,color:col,opacity:.7}}>días</div>
                                  </div>
                                ))}
                              </div>
                              {rest<0&&<div style={{fontSize:12,color:C.rojo,fontWeight:600,marginBottom:10}}>⚠️ {Math.abs(rest)} día(s) en negativo.</div>}
                              {/* Botones acción */}
                              <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
                                <button onClick={()=>{const v=prompt(`Editar saldo de ${c.nombre}:\nActual: ${c.diasAcumulados} días\n\nNuevo saldo:`);if(v!==null&&!isNaN(parseInt(v))){svColabs(colabs.map(x=>x.id===c.id?{...x,diasAcumulados:parseInt(v)}:x));}}} style={{padding:"7px 12px",borderRadius:8,border:`1.5px solid ${C.amarillo}`,background:"transparent",color:C.amarillo,fontSize:12,fontWeight:700,cursor:"pointer"}}>✏️ Editar saldo</button>
                                <button onClick={()=>waVacaciones(c)} style={{padding:"7px 12px",borderRadius:8,border:"none",background:"#25D366",color:C.blanco,fontSize:12,fontWeight:700,cursor:"pointer"}}>📲 WA Vacaciones</button>
                                <button onClick={()=>waPermisos(c)} style={{padding:"7px 12px",borderRadius:8,border:"none",background:"#128C7E",color:C.blanco,fontSize:12,fontWeight:700,cursor:"pointer"}}>📲 WA Permisos</button>
                              </div>
                              {/* Historial boletas */}
                              <div style={{fontSize:10,color:C.textoS,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Boletas utilizadas</div>
                              {registros.filter(r=>r.colabId===c.id&&!r.historico).length===0
                                ?<div style={{fontSize:12,color:C.textoS,marginBottom:12}}>Sin registros nuevos.</div>
                                :registros.filter(r=>r.colabId===c.id&&!r.historico).map(r=>(
                                  <div key={r.id} style={{display:"flex",gap:8,fontSize:12,padding:"5px 0",borderBottom:`1px solid ${C.g2}`,alignItems:"center"}}>
                                    <span style={{fontWeight:700,color:C.amarillo,minWidth:45}}>#{r.boleta}</span>
                                    <span style={{color:C.textoM,flex:1}}>{fmtDate(r.fechaInicio)} → {fmtDate(r.fechaFin)}</span>
                                    <span style={{fontWeight:700,color:C.azulL}}>{r.dias}d</span>
                                    <span style={{fontSize:10,color:r.estado==="reservado"?C.azulL:C.verde}}>{r.estado==="reservado"?"📌":"✓"}</span>
                                  </div>
                                ))
                              }
                              {/* Permisos */}
                              {permisos.filter(p=>p.colabId===c.id).length>0&&(
                                <div style={{marginTop:12}}>
                                  <div style={{fontSize:10,color:C.textoS,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>Permisos especiales</div>
                                  {permisos.filter(p=>p.colabId===c.id).map(p=>(
                                    <div key={p.id} style={{display:"flex",gap:8,fontSize:12,padding:"5px 0",borderBottom:`1px solid ${C.g2}`,alignItems:"center"}}>
                                      <span style={{color:C.naranja,minWidth:70}}>{p.fecha}</span>
                                      <span style={{background:C.g3,color:C.textoM,borderRadius:10,padding:"2px 8px",fontSize:10,fontWeight:600,whiteSpace:"nowrap"}}>{p.motivo}</span>
                                      <span style={{color:C.textoM,flex:1}}>{p.duracion}</span>
                                    </div>
                                  ))}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}

            <Field label="Fecha fin"><input type="date" value={regForm.fechaFin} onChange={e=>setRegForm(p=>({...p,fechaFin:e.target.value}))} style={inp}/></Field>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Mes"><select value={regForm.mes} onChange={e=>setRegForm(p=>({...p,mes:e.target.value}))} style={inp}>{MESES.map(m=><option key={m}>{m}</option>)}</select></Field>
            <Field label="Días"><input type="number" min="1" value={regForm.dias} onChange={e=>setRegForm(p=>({...p,dias:e.target.value}))} style={inp} placeholder="Ej. 3"/></Field>
          </div>
          <Field label="Estado">
            <div style={{display:"flex",gap:8}}>
              {["confirmado","reservado"].map(e=>(
                <button key={e} onClick={()=>setRegForm(p=>({...p,estado:e}))} style={{flex:1,padding:"9px",borderRadius:8,cursor:"pointer",fontSize:13,fontWeight:700,border:`2px solid ${regForm.estado===e?(e==="confirmado"?C.verde:C.azulL):C.g3}`,background:regForm.estado===e?(e==="confirmado"?"#14532D":"#1E3A5F"):"transparent",color:regForm.estado===e?(e==="confirmado"?C.verde:C.azulL):C.textoM}}>
                  {e==="confirmado"?"✓ Confirmado":"📌 Reservado"}
                </button>
              ))}
            </div>
          </Field>
          {conflicto&&(
            <div style={{background:"#1A0505",border:`1px solid ${C.rojo}`,borderRadius:8,padding:"12px 14px",fontSize:13,color:C.rojo,marginBottom:10,whiteSpace:"pre-line"}}>
              {conflicto}
              <div style={{display:"flex",gap:8,marginTop:10}}>
                <button onClick={()=>saveReg(true)} style={btnS}>Guardar de todas formas</button>
                <button onClick={()=>setConflicto(null)} style={btnS}>Revisar</button>
              </div>
            </div>
          )}
          {!conflicto&&<div style={{display:"flex",gap:10,marginTop:8}}><button onClick={()=>saveReg()} style={btnP}>Guardar</button><button onClick={resetRegForm} style={btnS}>Cancelar</button></div>}
        </Modal>
      )}

      {showColabForm&&(
        <Modal title={colabEdit?"Editar colaborador":"Agregar colaborador"} onClose={()=>{setShowColabForm(false);setColabEdit(null);}}>
          <Field label="Nombre completo"><input value={colabForm.nombre} onChange={e=>setColabForm(p=>({...p,nombre:e.target.value}))} style={inp} placeholder="Nombre" autoFocus/></Field>
          <Field label="Área">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              {AREAS.map(a=><button key={a} onClick={()=>setColabForm(p=>({...p,area:a}))} style={{padding:"9px",borderRadius:8,cursor:"pointer",fontSize:13,border:`2px solid ${colabForm.area===a?AREA_COLOR[a]:C.g3}`,background:colabForm.area===a?AREA_COLOR[a]+"20":"transparent",color:colabForm.area===a?AREA_COLOR[a]:C.textoM,fontWeight:colabForm.area===a?700:400}}>{a}</button>)}
            </div>
          </Field>
          <Field label="Días acumulados actuales"><input type="number" min="0" value={colabForm.diasAcumulados} onChange={e=>setColabForm(p=>({...p,diasAcumulados:parseInt(e.target.value)||0}))} style={inp}/></Field>
          <Field label="Teléfono WhatsApp"><input type="tel" value={colabForm.telefono||""} onChange={e=>setColabForm(p=>({...p,telefono:e.target.value}))} style={inp} placeholder="Ej. 88001234"/></Field>
          <div style={{display:"flex",gap:10,marginTop:8}}><button onClick={saveColab} style={btnP}>Guardar</button><button onClick={()=>{setShowColabForm(false);setColabEdit(null);}} style={btnS}>Cancelar</button></div>
        </Modal>
      )}

      {showReposForm&&(
        <Modal title={reposForm.reposEditId?"Editar reposición":"Agregar reposición"} onClose={()=>{setShowReposForm(null);setReposForm({fecha:new Date().toISOString().split("T")[0],duracion:"",reposEditId:null});}}>
          <Field label="Fecha de reposición">
            <input type="date" value={reposForm.fecha} onChange={e=>setReposForm(p=>({...p,fecha:e.target.value}))} style={inp}/>
          </Field>
          <Field label="Tiempo repuesto">
            <input value={reposForm.duracion} onChange={e=>setReposForm(p=>({...p,duracion:e.target.value}))} style={inp} placeholder="Ej: 1h, 30m, 1h 30m, 1:30"/>
          </Field>
          <div style={{background:"#14532D",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:13,color:"#4ADE80",fontWeight:700}}>
            {"Total: "+minToDur(durToMin(reposForm.duracion||"0"))}
          </div>
          <div style={{fontSize:11,color:C.textoS,marginBottom:12}}>
            Formatos válidos: 1h · 30m · 1h 30m · 1:30
          </div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={saveReposicion} style={{padding:"9px 18px",borderRadius:8,border:"none",background:"#4ADE80",color:C.negro,fontSize:13,fontWeight:700,cursor:"pointer"}}>Guardar</button>
            <button onClick={()=>{setShowReposForm(null);setReposForm({fecha:new Date().toISOString().split("T")[0],duracion:"",reposEditId:null});}} style={btnS}>Cancelar</button>
          </div>
        </Modal>
      )}

      {showIncapForm&&(
        <Modal title={incapEdit?"Editar incapacidad":"Nueva incapacidad"} onClose={resetIncapForm}>
          <Field label="Colaborador">
            <select value={incapForm.colabId} onChange={e=>setIncapForm(p=>({...p,colabId:e.target.value}))} style={inp}>
              <option value="">Seleccioná un colaborador</option>
              {AREAS.map(a=><optgroup key={a} label={a}>{colabs.filter(c=>c.area===a).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</optgroup>)}
            </select>
          </Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Fecha inicio"><input type="date" value={incapForm.fechaInicio} onChange={e=>setIncapForm(p=>({...p,fechaInicio:e.target.value}))} style={inp}/></Field>
            <Field label="Fecha fin"><input type="date" value={incapForm.fechaFin} onChange={e=>setIncapForm(p=>({...p,fechaFin:e.target.value}))} style={inp}/></Field>
          </div>
          {incapForm.fechaInicio&&incapForm.fechaFin&&(
            <div style={{background:"#2E1065",borderRadius:8,padding:"8px 12px",marginBottom:10,fontSize:13,color:"#C084FC",fontWeight:700}}>
              {"🏥 Total: "+calcDias(incapForm.fechaInicio,incapForm.fechaFin)+" día(s)"}
            </div>
          )}
          <Field label="Tipo de incapacidad">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              {["Enfermedad","Accidente laboral","Maternidad","Otro"].map(t=>(
                <button key={t} onClick={()=>setIncapForm(p=>({...p,tipo:t}))} style={{padding:"8px",borderRadius:8,cursor:"pointer",fontSize:12,border:"2px solid "+(incapForm.tipo===t?"#C084FC":C.g3),background:incapForm.tipo===t?"#2E1065":"transparent",color:incapForm.tipo===t?"#C084FC":C.textoM,fontWeight:incapForm.tipo===t?700:400}}>{t}</button>
              ))}
            </div>
          </Field>
          <Field label="Detalle (opcional)">
            <textarea value={incapForm.detalle} onChange={e=>setIncapForm(p=>({...p,detalle:e.target.value}))} style={{...inp,minHeight:60,resize:"vertical"}} placeholder="Descripción adicional..."/>
          </Field>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button onClick={saveIncap} style={{padding:"9px 18px",borderRadius:8,border:"none",background:"#7C3AED",color:C.blanco,fontSize:13,fontWeight:700,cursor:"pointer"}}>Guardar</button>
            <button onClick={resetIncapForm} style={btnS}>Cancelar</button>
          </div>
        </Modal>
      )}

      {showExtraForm&&(
        <Modal title={extraEdit?"Editar tiempo extra":"Nuevo tiempo extra"} onClose={resetExtraForm}>
          <Field label="Colaborador">
            <select value={extraForm.colabId} onChange={e=>setExtraForm(p=>({...p,colabId:e.target.value}))} style={inp}>
              <option value="">Seleccioná un colaborador</option>
              {AREAS.map(a=><optgroup key={a} label={a}>{colabs.filter(c=>c.area===a).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</optgroup>)}
            </select>
          </Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Fecha"><input type="date" value={extraForm.fecha} onChange={e=>setExtraForm(p=>({...p,fecha:e.target.value}))} style={inp}/></Field>
            <Field label="Duración"><input value={extraForm.duracion} onChange={e=>setExtraForm(p=>({...p,duracion:e.target.value}))} style={inp} placeholder="Ej. 2h 30min"/></Field>
          </div>
          <Field label="Razón (opcional)"><input value={extraForm.motivo} onChange={e=>setExtraForm(p=>({...p,motivo:e.target.value}))} style={inp} placeholder="Ej. Cierre de mes..."/></Field>
          <Field label="Detalle (opcional)"><textarea value={extraForm.detalle} onChange={e=>setExtraForm(p=>({...p,detalle:e.target.value}))} style={{...inp,minHeight:60,resize:"vertical"}} placeholder="Descripción adicional..."/></Field>
          <div style={{display:"flex",gap:10,marginTop:8}}>
            <button onClick={saveExtra} style={{padding:"9px 18px",borderRadius:8,border:"none",background:C.amarillo,color:C.negro,fontSize:13,fontWeight:700,cursor:"pointer"}}>Guardar</button>
            <button onClick={resetExtraForm} style={btnS}>Cancelar</button>
          </div>
        </Modal>
      )}

      {showReposExtraForm&&(
        <Modal title={reposExtraForm.reposEditId?"Editar reposición":"Registrar reposición de empresa"} onClose={()=>{setShowReposExtraForm(null);setReposExtraForm({fecha:new Date().toISOString().split("T")[0],duracion:"",reposEditId:null});}}>
          <div style={{background:C.amarillo+"15",border:"1px solid "+C.amarillo,borderRadius:8,padding:"10px 12px",marginBottom:14,fontSize:12,color:C.amarillo}}>
            {"📥 Tiempo que la empresa le repone al colaborador."}
          </div>
          <Field label="Fecha"><input type="date" value={reposExtraForm.fecha} onChange={e=>setReposExtraForm(p=>({...p,fecha:e.target.value}))} style={inp}/></Field>
          <Field label="Tiempo repuesto">
            <input value={reposExtraForm.duracion} onChange={e=>setReposExtraForm(p=>({...p,duracion:e.target.value}))} style={inp} placeholder="Ej: 1h, 30m, 1h 30m, 1:30"/>
          </Field>
          <div style={{background:C.amarillo+"15",borderRadius:8,padding:"8px 12px",marginBottom:8,fontSize:13,color:C.amarillo,fontWeight:700}}>
            {"Total: "+minToDur(durToMin(reposExtraForm.duracion||"0"))}
          </div>
          <div style={{fontSize:11,color:C.textoS,marginBottom:12}}>Formatos válidos: 1h · 30m · 1h 30m · 1:30</div>
          <div style={{display:"flex",gap:10}}>
            <button onClick={saveExtraReposicion} style={{padding:"9px 18px",borderRadius:8,border:"none",background:C.amarillo,color:C.negro,fontSize:13,fontWeight:700,cursor:"pointer"}}>Guardar</button>
            <button onClick={()=>{setShowReposExtraForm(null);setReposExtraForm({fecha:new Date().toISOString().split("T")[0],duracion:"",reposEditId:null});}} style={btnS}>Cancelar</button>
          </div>
        </Modal>
      )}

      {showPermisoForm&&(
        <Modal title={permisoEdit?"Editar permiso":"Nuevo permiso especial"} onClose={resetPermisoForm}>
          <Field label="Colaborador">
            <select value={permisoForm.colabId} onChange={e=>setPermisoForm(p=>({...p,colabId:e.target.value}))} style={inp}>
              <option value="">Seleccioná un colaborador</option>
              {AREAS.map(a=><optgroup key={a} label={a}>{colabs.filter(c=>c.area===a).map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}</optgroup>)}
            </select>
          </Field>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <Field label="Fecha"><input type="date" value={permisoForm.fecha} onChange={e=>setPermisoForm(p=>({...p,fecha:e.target.value}))} style={inp}/></Field>
            <Field label="Duración"><input value={permisoForm.duracion} onChange={e=>setPermisoForm(p=>({...p,duracion:e.target.value}))} style={inp} placeholder="Ej. 1h 30min"/></Field>
          </div>
          <Field label="Motivo">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
              {MOTIVOS.map(m=>{
                const MC={Médico:C.verde,Judicial:C.amarillo,Familiar:C.naranja,Personal:C.azulL,Otro:C.textoM};
                return<button key={m} onClick={()=>setPermisoForm(p=>({...p,motivo:m}))} style={{padding:"8px",borderRadius:8,cursor:"pointer",fontSize:12,border:`2px solid ${permisoForm.motivo===m?MC[m]:C.g3}`,background:permisoForm.motivo===m?MC[m]+"20":"transparent",color:permisoForm.motivo===m?MC[m]:C.textoM,fontWeight:permisoForm.motivo===m?700:400}}>{m}</button>;
              })}
            </div>
          </Field>
          <Field label="Detalle (opcional)">
            <textarea value={permisoForm.detalle} onChange={e=>setPermisoForm(p=>({...p,detalle:e.target.value}))} style={{...inp,minHeight:70,resize:"vertical"}} placeholder="Descripción adicional..."/>
          </Field>
          <div style={{display:"flex",gap:10,marginTop:8}}><button onClick={savePermiso} style={btnA}>Guardar permiso</button><button onClick={resetPermisoForm} style={btnS}>Cancelar</button></div>
        </Modal>
      )}



      {delConfirm&&(
        <Modal title="¿Eliminar?" onClose={()=>setDelConfirm(null)}>
          <p style={{color:C.textoM,fontSize:14,marginBottom:16}}>
            {delConfirm.type==="colab"?"Se eliminará el colaborador y todos sus registros.":delConfirm.type==="reg"?"Se eliminará este registro de vacaciones.":delConfirm.type==="permiso"?"Se eliminará este permiso.":delConfirm.type==="extra"?"Se eliminará este registro de tiempo extra.":"Se eliminará esta incapacidad."}
          </p>
          <div style={{display:"flex",gap:10}}>
            <button onClick={()=>{
              if(delConfirm.type==="colab")eliminarColab(delConfirm.id);
              else if(delConfirm.type==="reg")eliminarReg(delConfirm.id);
              else if(delConfirm.type==="permiso")eliminarPermiso(delConfirm.id);
              else if(delConfirm.type==="extra")eliminarExtra(delConfirm.id);
              else if(delConfirm.type==="incap")eliminarIncap(delConfirm.id);
            }} style={btnD}>Sí, eliminar</button>
            <button onClick={()=>setDelConfirm(null)} style={btnS}>Cancelar</button>
          </div>
        </Modal>
      )}

      {showBorrarHist&&(
        <Modal title="¿Borrar historial de café?" onClose={()=>setShowBorrarHist(false)}>
          <p style={{color:C.textoM,fontSize:14,marginBottom:16}}>Se eliminarán todos los registros. No se puede deshacer.</p>
          <div style={{display:"flex",gap:10}}><button onClick={()=>{svHistCafe([]);setShowBorrarHist(false);}} style={btnD}>Sí, borrar todo</button><button onClick={()=>setShowBorrarHist(false)} style={btnS}>Cancelar</button></div>
        </Modal>
      )}
    </div>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
      <div style={{background:"#111827",borderRadius:14,padding:20,width:"100%",maxWidth:480,maxHeight:"92vh",overflowY:"auto",border:"1px solid #374151"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
          <div style={{fontWeight:800,fontSize:15,color:"#F1F5F9"}}>{title}</div>
          <button onClick={onClose} style={{border:"none",background:"none",fontSize:22,cursor:"pointer",color:"#F97316",lineHeight:1}}>×</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({label,children}){
  return(
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:10,fontWeight:700,color:"#94A3B8",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>{label}</label>
      {children}
    </div>
  );
}

function Empty({icon,msg}){
  return<div style={{textAlign:"center",padding:"48px 24px",color:"#64748B"}}><div style={{fontSize:36,marginBottom:10}}>{icon}</div>{msg}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
